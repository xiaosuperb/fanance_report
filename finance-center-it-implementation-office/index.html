<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>财务中心IT化实施思路</title>
<script>
  window.DECK_MANIFEST = [
    { file: "slides/01-cover.html", label: "Cover" },
    { file: "slides/02-why-now.html", label: "Why Now" },
    { file: "slides/03-target-state.html", label: "Target State" },
    { file: "slides/04-overall-architecture.html", label: "Architecture" },
    { file: "slides/05-roadmap.html", label: "Roadmap" },
    { file: "slides/06-key-modules.html", label: "Key Modules" },
    { file: "slides/07-governance.html", label: "Governance" },
    { file: "slides/08-risks.html", label: "Risks" },
    { file: "slides/09-milestones.html", label: "Milestones" },
    { file: "slides/10-closing.html", label: "Closing" }
  ];
  window.DECK_WIDTH = 1280;
  window.DECK_HEIGHT = 720;
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0f172a; overflow: hidden; font-family: -apple-system, "PingFang SC", sans-serif; }
#stage { position: fixed; top: 50%; left: 50%; transform-origin: top left; will-change: transform; background: #fff; box-shadow: 0 10px 60px rgba(0,0,0,0.45); }
iframe { width: 100%; height: 100%; border: 0; display: block; background: #fff; }
.counter { position: fixed; bottom: 18px; right: 18px; background: rgba(0,0,0,0.68); color: #fff; padding: 6px 12px; border-radius: 999px; font-size: 12px; z-index: 50; }
</style>
</head>
<body>
<div id="stage"><iframe id="frame" src="about:blank"></iframe></div>
<div class="counter" id="counter">1 / 10</div>
<script>
(function(){
  const W = window.DECK_WIDTH, H = window.DECK_HEIGHT, deck = window.DECK_MANIFEST;
  const stage = document.getElementById('stage'); const frame = document.getElementById('frame'); const counter = document.getElementById('counter');
  let current = 0;
  stage.style.width = W + 'px'; stage.style.height = H + 'px';
  function fit(){ const s = Math.min(window.innerWidth / W, window.innerHeight / H); const x = (window.innerWidth - W*s)/2; const y = (window.innerHeight - H*s)/2; stage.style.transform = `translate(${x}px, ${y}px) scale(${s})`; stage.style.top='0'; stage.style.left='0'; }
  function show(i){ if(i<0||i>=deck.length) return; current = i; frame.src = deck[i].file; counter.textContent = `${i+1} / ${deck.length}`; }
  function next(){ show(Math.min(current+1, deck.length-1)); }
  function prev(){ show(Math.max(current-1, 0)); }
  document.addEventListener('keydown', (e)=>{ if(['ArrowRight',' ','PageDown'].includes(e.key)){ e.preventDefault(); next(); } if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); prev(); } if(e.key==='Home'){show(0);} if(e.key==='End'){show(deck.length-1);} });
  window.addEventListener('resize', fit); fit(); show(0);
})();
</script>
</body>
</html>
